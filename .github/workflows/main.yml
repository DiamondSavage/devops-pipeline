name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t abdallahhegazy/devops-pipeline:latest .

      - name: Run Container
        run: |
          docker run -d --name flask-test -p 5000:5000 \
          -e APP_VERSION=${{ github.sha }} \
          -e ENVIRONMENT=production \
          abdallahhegazy/devops-pipeline:latest

      - name: Wait for Application
        run: sleep 5

      - name: Health Check
        run: |
          curl --fail http://localhost:5000/health

      - name: Push Docker Image
        run: |
          docker push abdallahhegazy/devops-pipeline:latest