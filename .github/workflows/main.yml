name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: |
          docker build -t abdallahhegazy/devops-pipeline:latest ./app

      - name: Run Container
        run: |
          docker run -d -p 5000:5000 --name flask-test abdallahhegazy/devops-pipeline:latest

      - name: Wait
        run: sleep 5

      - name: Health Check
        run: |
          curl --fail http://localhost:5000/health

      - name: Push Image
        run: |
          docker push abdallahhegazy/devops-pipeline:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            docker pull abdallahhegazy/devops-pipeline:latest

            docker stop flask || true

            docker rm flask || true

            docker run -d \
              --name flask \
              --restart unless-stopped \
              -p 5000:5000 \
              -e APP_VERSION=2.0.0 \
              -e ENVIRONMENT=Production \
              abdallahhegazy/devops-pipeline:latest